version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relurl-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://relurl:relurl_password@postgres:5432/relurl
      DIRECT_URL: postgresql://relurl:relurl_password@postgres:5432/relurl
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - relurl-network

  postgres:
    image: postgres:16-alpine
    container_name: relurl-postgres
    environment:
      POSTGRES_USER: relurl
      POSTGRES_PASSWORD: relurl_password
      POSTGRES_DB: relurl
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relurl"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - relurl-network

  redis:
    image: redis:7-alpine
    container_name: relurl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - relurl-network

volumes:
  postgres-data:
  redis-data:

networks:
  relurl-network:
    driver: bridge
