<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RELURL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0e17;
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e1b4b;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: #1e1b4b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      color: #818cf8;
    }
    .brand h1 {
      font-size: 16px;
      font-weight: 700;
      color: #e2e8f0;
    }
    .brand span {
      font-size: 11px;
      color: #818cf8;
    }
    .section { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      background: #1a1932;
      border: 1px solid #2d2b55;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus {
      border-color: #818cf8;
    }
    input[type="url"]::placeholder {
      color: #64748b;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #1e1b4b;
      color: #818cf8;
      border: 1px solid #2d2b55;
    }
    .btn-secondary:hover { background: #2d2b55; }
    .btn-copy {
      padding: 8px 12px;
      background: #1e1b4b;
      color: #818cf8;
      border: 1px solid #2d2b55;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: #2d2b55; }
    .btn-copy.copied { color: #34d399; border-color: #34d399; }
    .result-box {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #1a1932;
      border: 1px solid #2d2b55;
      border-radius: 8px;
      margin-top: 8px;
    }
    .result-box.show { display: flex; }
    .result-box .url {
      flex: 1;
      font-size: 13px;
      color: #818cf8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #2d2b55;
      border-top: 2px solid #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      display: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.show { display: block; }
    .status.error { background: #2d1b1b; color: #fca5a5; border: 1px solid #7f1d1d; }
    .status.info { background: #1a1b3a; color: #818cf8; border: 1px solid #2d2b55; }
    .status.success { background: #1a2d1b; color: #34d399; border: 1px solid #1a4a2b; }
    .footer {
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid #1e1b4b;
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
      font-size: 12px;
    }
    .footer a:hover { color: #818cf8; }
    .login-prompt {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .login-prompt.show { display: block; }
    .login-prompt p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .main-content { display: block; }
    .main-content.hidden { display: none; }
    .error-detail {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">R</div>
    <div class="brand">
      <h1>RELURL</h1>
      <span>URL Shortener</span>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div id="mainContent" class="main-content">
    <div class="section">
      <label for="urlInput">URL to shorten</label>
      <input type="url" id="urlInput" placeholder="https://example.com/long-url..." autofocus>
    </div>

    <div class="section">
      <button id="shortenBtn" class="btn btn-primary">Shorten</button>
    </div>

    <div class="section">
      <div class="spinner" id="spinner"></div>
      <div class="result-box" id="resultBox">
        <span class="url" id="shortUrl"></span>
        <button class="btn-copy" id="copyBtn">Copy</button>
      </div>
    </div>
  </div>

  <div id="loginPrompt" class="login-prompt">
    <p>Please log in to RELURL to shorten URLs.</p>
    <a id="loginLink" href="https://relurl.com/login" target="_blank" class="btn btn-primary" style="display:inline-block;width:auto;padding:10px 24px;text-decoration:none;">Log in to RELURL</a>
  </div>

  <div class="footer">
    <a href="https://relurl.com/dashboard" target="_blank">Dashboard</a>
    <a href="#" id="optionsLink">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
